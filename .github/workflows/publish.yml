name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # OIDC trusted publishing (npmjs.com) is the auth path for this workflow.
      # No NODE_AUTH_TOKEN env var is set: an always-present-but-empty token
      # risks the npm CLI treating auth as attempted-and-failed instead of
      # falling through to OIDC. If trusted publishing isn't registered yet,
      # this step fails with ENEEDAUTH until it is (see npm docs for setup).
      # This package is pure ESM JS with no build step; files are published as-is.
      - run: npm publish --access public
