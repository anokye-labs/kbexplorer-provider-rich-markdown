name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # OIDC trusted publishing is used automatically when configured on npmjs.com.
      # For the initial publish before trusted publishing is set up, add an
      # NPM_TOKEN secret to the repo (Settings → Secrets → Actions).
      # Once trusted publishing is configured, remove the NPM_TOKEN secret.
      # This package is pure ESM JS with no build step; files are published as-is.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
