name: Publish to npm

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm test

  publish:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # OIDC trusted publishing (npmjs.com) is the auth path for this workflow.
      # NODE_AUTH_TOKEN is set to an explicit empty string rather than omitted:
      # actions/setup-node always writes .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}`, and per npm's own docs an env var
      # that is fully UNDEFINED is left unreplaced (the literal
      # "${NODE_AUTH_TOKEN}" string is sent as the token). Only a
      # DEFINED-but-empty var substitutes cleanly to "", which is what lets
      # the npm CLI fall through to OIDC instead of sending a bogus token.
      # If trusted publishing isn't registered yet, this step fails with
      # ENEEDAUTH until it is (see npm docs for setup).
      # This package is pure ESM JS with no build step; files are published as-is.
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ''
